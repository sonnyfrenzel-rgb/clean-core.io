name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - release
      - main

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation OIDC

jobs:
  # Job 1: Build, Lint & Test (Quality Gate)
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --foreground-scripts

      - name: Run Linting Checks
        run: npm run lint

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Start Firebase Emulator
        run: |
          npx firebase emulators:start --only auth,firestore --project=cleancore-491216 &
          sleep 10

      - name: Build Next.js Application
        run: npm run build
        env:
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: 'true'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          MFA_BACKUP_CODE_PEPPER: ${{ secrets.MFA_BACKUP_CODE_PEPPER }}
          PILOT_APPROVAL_SECRET: ${{ secrets.PILOT_APPROVAL_SECRET }}
          S4_ENCRYPTION_KEY: ${{ secrets.S4_ENCRYPTION_KEY }}

      - name: Run End-to-End Tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: 'true'
          FIREBASE_AUTH_EMULATOR_HOST: '127.0.0.1:9099'
          FIRESTORE_EMULATOR_HOST: '127.0.0.1:8080'
          MFA_BACKUP_CODE_PEPPER: ${{ secrets.MFA_BACKUP_CODE_PEPPER }}
          PILOT_APPROVAL_SECRET: ${{ secrets.PILOT_APPROVAL_SECRET }}
          S4_ENCRYPTION_KEY: ${{ secrets.S4_ENCRYPTION_KEY }}

      - name: Generate QE Quality Engineering Report
        run: npm run build:report

      - name: Upload QE Report Artifact
        uses: actions/upload-artifact@v5
        with:
          name: qe-report
          path: public/QE_Engineer_Report.pdf

  # Job 2: Build & Deploy to Google Cloud Run
  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download QE Report Artifact
        uses: actions/download-artifact@v5
        with:
          name: qe-report
          path: public/

      # Determine environment specific variables based on push branch
      # Security: github.ref_name is passed via env to prevent shell injection
      - name: Set Environment Context
        id: env-ctx
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$REF_NAME" in
            main)
              echo "service=clean-core" >> "$GITHUB_OUTPUT"
              echo "db_id=ai-studio-e57d33e3-9092-46bd-9c18-ac19c9a8b67e" >> "$GITHUB_OUTPUT"
              echo "app_url=https://clean-core.io" >> "$GITHUB_OUTPUT"
              ;;
            release)
              echo "service=clean-core-test" >> "$GITHUB_OUTPUT"
              echo "db_id=ai-studio-39b46c45-cda0-481e-9847-19682e979043" >> "$GITHUB_OUTPUT"
              echo "app_url=https://test.clean-core.io" >> "$GITHUB_OUTPUT"
              ;;
            dev)
              echo "service=clean-core-dev" >> "$GITHUB_OUTPUT"
              echo "db_id=ai-studio-030e1ee1-7e1d-4208-beda-28735bc1a360" >> "$GITHUB_OUTPUT"
              echo "app_url=https://dev.clean-core.io" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: $REF_NAME" >&2
              exit 1
              ;;
          esac

      # F-15: Assert no emulator flag leaks into production deploy
      - name: Assert No Emulator Flag in Deploy
        run: |
          if [ "${NEXT_PUBLIC_USE_FIREBASE_EMULATOR:-}" = "true" ]; then
            echo "::error::FATAL: NEXT_PUBLIC_USE_FIREBASE_EMULATOR must not be 'true' in deploy!"
            exit 1
          fi

      # Authenticate securely with Google Cloud using OIDC Workload Identity Federation
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/819734065839/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: '819734065839-compute@developer.gserviceaccount.com'
          project_id: 'cleancore-491216'

      # Deploy source code directly to Cloud Run
      - name: Deploy to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.env-ctx.outputs.service }}
          region: 'europe-west1'
          source: '.'
          project_id: 'cleancore-491216'
          flags: |
            --memory=2Gi
            --cpu=2
            --allow-unauthenticated
            --set-build-env-vars=NEXT_PUBLIC_FIRESTORE_DB_ID=${{ steps.env-ctx.outputs.db_id }},NEXT_PUBLIC_APP_URL=${{ steps.env-ctx.outputs.app_url }},NODE_OPTIONS=--max-old-space-size=4096
          env_vars: |
            NEXT_PUBLIC_FIRESTORE_DB_ID=${{ steps.env-ctx.outputs.db_id }}
            NEXT_PUBLIC_APP_URL=${{ steps.env-ctx.outputs.app_url }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            S4_ENCRYPTION_KEY=${{ secrets.S4_ENCRYPTION_KEY }}
            S4_HOST_ALLOWLIST=${{ secrets.S4_HOST_ALLOWLIST }}
            MFA_BACKUP_CODE_PEPPER=${{ secrets.MFA_BACKUP_CODE_PEPPER }}
            PILOT_APPROVAL_SECRET=${{ secrets.PILOT_APPROVAL_SECRET }}
            NODE_OPTIONS=--max-old-space-size=4096

name: Sync SAP Cloudification Repository

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --foreground-scripts

      - name: Sync catalog (latest)
        id: sync
        run: |
          set +e
          npx tsx scripts/sync-cloudification-repo.ts latest
          code=$?
          set -e
          if [ "$code" = "20" ]; then echo "changed=true" >> "$GITHUB_OUTPUT";
          elif [ "$code" = "0" ]; then echo "changed=false" >> "$GITHUB_OUTPUT";
          else exit "$code"; fi

      - name: Open PR with catalog update
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6.1.0
        with:
          branch: chore/sync-cloudification-repo
          title: "chore(catalog): sync SAP Cloudification Repository"
          commit-message: "chore(catalog): sync SAP Cloudification Repository"
          body: |
            Automated weekly sync of the SAP Cloudification Repository
            (github.com/SAP/abap-atc-cr-cv-s4hc).
            Review the diff — new/changed successors update the merged catalog,
            evidence findings and the Audit Pack traceability string.
          labels: catalog, automated

name: Security CI

# Supply-chain & secret hygiene gates. Runs on PRs, pushes to the deploy
# branches, and weekly (to catch newly-disclosed CVEs in unchanged deps).
on:
  pull_request:
  push:
    branches: [main, release, dev]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits
      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  dependency-audit:
    name: Dependency audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      # Fail on High/Critical advisories. Accepted exceptions are documented with
      # a rationale + review date in audit-ci.jsonc (no blanket lowering of the gate).
      - name: Dependency audit (high+, reviewed allowlist)
        run: npx --yes audit-ci@^7 --config audit-ci.jsonc

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: sbom.json
          if-no-files-found: error

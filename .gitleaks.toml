# Gitleaks configuration for Clean-Core.io
# Extends the built-in ruleset; adds narrowly-scoped allowlists for values that
# are public by design (not secrets). Keep allowlists path-scoped, never broad
# regexes, so real leaked keys are still caught.

title = "Clean-Core.io gitleaks configuration"

[extend]
useDefault = true

[allowlist]
description = "Public-by-design values (Firebase Web app config apiKey is a public client identifier, not a secret) and deterministic CI test placeholders."
paths = [
  '''firebase-applet-config\.json''',
  '''\.env\.example''',
  '''playwright\.config\.ts''',
]
regexes = [
  # Deterministic CI test placeholders — not real credentials.
  '''test-approval-secret-key-\d+''',
  '''test-mfa-pepper-[a-z0-9-]+''',
]
